    const counties = {"type": "FeatureCollection", "features": [{"type": "Feature", "properties": {"GEO_ID": "0500000US48491", "STATE": "48", "COUNTY": "491", "NAME": "Williamson", "LSAD": "County", "CENSUSAREA": 1118.303}, "geometry": {"type": "Polygon", "coordinates": [[[-97.369539, 30.419563], [-97.576167, 30.501799], [-97.775211, 30.429993], [-97.956734, 30.628249], [-98.049886, 30.624155], [-97.96286, 30.785641], [-97.828512, 30.906188], [-97.625288, 30.87043], [-97.315507, 30.752371], [-97.271418, 30.735692], [-97.155219, 30.457344], [-97.334463, 30.402843], [-97.369539, 30.419563]]]}, "id": "48491"}, {"type": "Feature", "properties": {"GEO_ID": "0500000US48021", "STATE": "48", "COUNTY": "021", "NAME": "Bastrop", "LSAD": "County", "CENSUSAREA": 888.15}, "geometry": {"type": "Polygon", "coordinates": [[[-97.04821, 30.137947], [-97.024461, 30.051435], [-97.315823, 29.786541], [-97.648043, 30.067262], [-97.649449, 30.067866], [-97.492679, 30.209946], [-97.486329, 30.220528], [-97.409875, 30.351329], [-97.377227, 30.407086], [-97.369539, 30.419563], [-97.334463, 30.402843], [-97.081834, 30.259357], [-97.04821, 30.137947]]]}, "id": "48021"}, {"type": "Feature", "properties": {"GEO_ID": "0500000US48055", "STATE": "48", "COUNTY": "055", "NAME": "Caldwell", "LSAD": "County", "CENSUSAREA": 545.257}, "geometry": {"type": "Polygon", "coordinates": [[[-97.315823, 29.786541], [-97.317893, 29.784658], [-97.597743, 29.630718], [-97.633176, 29.649863], [-97.721852, 29.682088], [-97.875259, 29.858208], [-97.893896, 29.883734], [-97.710215, 30.024499], [-97.655257, 30.072907], [-97.649449, 30.067866], [-97.648043, 30.067262], [-97.315823, 29.786541]]]}, "id": "48055"}, {"type": "Feature", "properties": {"GEO_ID": "0500000US48453", "STATE": "48", "COUNTY": "453", "NAME": "Travis", "LSAD": "County", "CENSUSAREA": 990.202}, "geometry": {"type": "Polygon", "coordinates": [[[-97.409875, 30.351329], [-97.486329, 30.220528], [-97.492679, 30.209946], [-97.649449, 30.067866], [-97.655257, 30.072907], [-97.710215, 30.024499], [-98.011253, 30.242288], [-98.172977, 30.356312], [-98.125556, 30.426186], [-98.123111, 30.484723], [-98.049886, 30.624155], [-97.956734, 30.628249], [-97.775211, 30.429993], [-97.576167, 30.501799], [-97.369539, 30.419563], [-97.377227, 30.407086], [-97.409875, 30.351329]]]}, "id": "48453"}, {"type": "Feature", "properties": {"GEO_ID": "0500000US48209", "STATE": "48", "COUNTY": "209", "NAME": "Hays", "LSAD": "County", "CENSUSAREA": 677.978}, "geometry": {"type": "Polygon", "coordinates": [[[-98.172977, 30.356312], [-98.011253, 30.242288], [-97.710215, 30.024499], [-97.893896, 29.883734], [-97.875259, 29.858208], [-97.999271, 29.752444], [-98.030523, 29.848539], [-98.2976, 30.037994], [-98.172977, 30.356312]]]}, "id": "48209"}]};
    const map = L.map('map').setView([30.277925, -97.708440], 9);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
    }).addTo(map);

    let countyLayer = null;
    if (counties) {
      countyLayer = L.geoJSON(counties, {
        style: {
          color: '#111',
          weight: 2,
          opacity: 0.85,
          fillOpacity: 0.02
        }
      }).addTo(map);
    }

    const colors = {
      online: '#26a641',
      offline: '#d1242f',
      other: '#8c959f'
    };

    function makeAqsIcon(color = '#111111', size = 16) {
      const height = Math.round(size * 0.94);
      const half = Math.round(size / 2);
      return L.divIcon({
      className: '',
        html: `<div style="width:0;height:0;border-left:${half}px solid transparent;border-right:${half}px solid transparent;border-bottom:${height}px solid ${color};"></div>`,
        iconSize: [size, height],
        iconAnchor: [half, Math.round(height / 2)],
      popupAnchor: [0, -8]
      });
    }

    const defaultAqsIcon = makeAqsIcon('#111111', 16);
    const highlightedAqsIcon = makeAqsIcon('#005fcc', 24);
    const aqsLayers = new Map();
    const aqsGroup = L.layerGroup().addTo(map);

    function resetAqsHighlights() {
      aqsLayers.forEach((layers) => {
        layers.circle.setStyle({
          color: '#777777',
          weight: 2,
          dashArray: '6 6',
          fill: false,
          opacity: 0.9
        });
        layers.marker.setIcon(defaultAqsIcon);
      });
    }

    function highlightNearestAqs(stationId) {
      resetAqsHighlights();
      const layers = aqsLayers.get(String(stationId));
      if (!layers) return;
      layers.circle.setStyle({
        color: '#005fcc',
        weight: 4,
        dashArray: '6 6',
        fill: false,
        opacity: 1
      });
      layers.marker.setIcon(highlightedAqsIcon);
      layers.marker.bringToFront();
      layers.circle.bringToFront();
    }

    aqsStations.forEach((station) => {
      const circle = L.circle([station.lat, station.lon], {
        radius: station.radius_m,
        color: '#777777',
        weight: 2,
        dashArray: '6 6',
        fill: false,
        opacity: 0.9
      }).bindPopup(station.popup, { maxWidth: 420 }).addTo(aqsGroup);

      const marker = L.marker([station.lat, station.lon], { icon: defaultAqsIcon })
        .bindPopup(station.popup, { maxWidth: 420 })
        .addTo(aqsGroup);
      aqsLayers.set(String(station.id), { circle, marker });
    });

    const sensorLayers = [];
    sensors.forEach((sensor) => {
      const marker = L.circleMarker([sensor.lat, sensor.lon], {
        radius: sensor.radius,
        color: '#111111',
        weight: 1.25,
        fillColor: colors[sensor.status] || colors.other,
        fillOpacity: sensor.daily_rows > 0 ? 0.78 : 0.15
      }).bindPopup(sensor.popup, { maxWidth: 420 }).addTo(map);

      marker.on('click', () => {
        highlightNearestAqs(sensor.nearest_aqs_id);
      });
      marker.on('popupclose', () => {
        resetAqsHighlights();
      });
      sensorLayers.push({ sensor, marker });
    });

    // An empty group means that dimension is not being used as a filter.
    const matchesAnyRange = (value, selected, ranges) =>
      selected.size === 0 || [...selected].some(choice => ranges[choice](value));
    const historyRanges = {
      none: v => v === null || v <= 0, lt1: v => v !== null && v > 0 && v < 365,
      '1to3': v => v !== null && v >= 365 && v <= 1095, gt3: v => v !== null && v > 1095
    };
    const completenessRanges = {
      none: v => v === null, lt25: v => v !== null && v < 25,
      '25to50': v => v !== null && v >= 25 && v < 50, '50to75': v => v !== null && v >= 50 && v < 75,
      '75to90': v => v !== null && v >= 75 && v < 90, gte90: v => v !== null && v >= 90
    };
    const distanceRanges = {
      none: v => v === null, lt1: v => v !== null && v <= 1000,
      '1to5': v => v !== null && v > 1000 && v <= 5000, gt5: v => v !== null && v > 5000
    };

    function applyFilters() {
      const statuses = new Set([...document.querySelectorAll('.statusFilter:checked')].map(x => x.value));
      const search = document.getElementById('search').value.trim().toLowerCase();
      const countiesSelected = new Set([...document.querySelectorAll('.countyFilter:checked')].map(x => x.value));
      const ownersSelected = new Set([...document.querySelectorAll('.ownerFilter:checked')].map(x => x.value));
      const historiesSelected = new Set([...document.querySelectorAll('.historyFilter:checked')].map(x => x.value));
      const completenessSelected = new Set([...document.querySelectorAll('.completeFilter:checked')].map(x => x.value));
      const distancesSelected = new Set([...document.querySelectorAll('.distanceFilter:checked')].map(x => x.value));
      let visible = 0;
      const visibleStatuses = { online: 0, offline: 0, other: 0 };
      sensorLayers.forEach((item) => {
        const s = item.sensor;
        const show = (statuses.size === 0 || statuses.has(s.status)) &&
          (!search || s.search_text.includes(search)) &&
          (countiesSelected.size === 0 || countiesSelected.has(s.county)) &&
          (ownersSelected.size === 0 || ownersSelected.has(s.owner)) &&
          matchesAnyRange(s.coverage_span_days, historiesSelected, historyRanges) &&
          matchesAnyRange(s.coverage_percent, completenessSelected, completenessRanges) &&
          matchesAnyRange(s.aqs_distance_m, distancesSelected, distanceRanges);
        // With no coverage-length categories selected, retain locations but
        // turn off the coverage-size encoding by using one small radius.
        item.marker.setRadius(historiesSelected.size === 0 ? 6 : s.radius);
        if (show && !map.hasLayer(item.marker)) item.marker.addTo(map);
        if (!show && map.hasLayer(item.marker)) map.removeLayer(item.marker);
        if (show) {
          visible++;
          visibleStatuses[s.status] = (visibleStatuses[s.status] || 0) + 1;
        }
      });
      document.getElementById('visibleCount').textContent = `${visible} of ${sensors.length} sensors visible`;
      document.getElementById('legendTotal').textContent = visible;
      document.getElementById('legendOnline').textContent = visibleStatuses.online;
      document.getElementById('legendOffline').textContent = visibleStatuses.offline;
      document.getElementById('legendOther').textContent = visibleStatuses.other;
      document.getElementById('sizeLegend').style.display = historiesSelected.size === 0 ? 'none' : 'block';
    }

    document.querySelectorAll('.selectAll').forEach(allBox => {
      allBox.addEventListener('change', () => {
        document.querySelectorAll('.' + allBox.dataset.target).forEach(x => x.checked = allBox.checked);
        applyFilters();
      });
    });
    document.querySelectorAll('.statusFilter, .countyFilter, .ownerFilter, .historyFilter, .completeFilter, .distanceFilter').forEach(box => {
      box.addEventListener('change', () => {
        const allBox = document.querySelector(`.selectAll[data-target="${box.className}"]`);
        const group = [...document.querySelectorAll('.' + box.className)];
        if (allBox) allBox.checked = group.every(x => x.checked);
        applyFilters();
      });
    });
    document.getElementById('search').addEventListener('input', applyFilters);
    document.getElementById('showAqs').addEventListener('change', e =>
      e.target.checked ? aqsGroup.addTo(map) : map.removeLayer(aqsGroup));
    document.getElementById('showCounties').addEventListener('change', e => {
      if (!countyLayer) return;
      e.target.checked ? countyLayer.addTo(map) : map.removeLayer(countyLayer);
    });
    document.getElementById('resetFilters').addEventListener('click', () => {
      document.getElementById('search').value = '';
      document.querySelectorAll('.statusFilter, .countyFilter, .ownerFilter, .historyFilter, .completeFilter, .distanceFilter')
        .forEach(x => x.checked = true);
      document.querySelectorAll('.selectAll').forEach(x => x.checked = true);
      document.getElementById('showAqs').checked = true; aqsGroup.addTo(map);
      document.getElementById('showCounties').checked = true; if (countyLayer) countyLayer.addTo(map);
      applyFilters();
    });
    const filterDrawer = document.querySelector('.filters');
    document.getElementById('filterToggle').addEventListener('click', () => filterDrawer.classList.toggle('open'));
    document.getElementById('filterClose').addEventListener('click', () => filterDrawer.classList.remove('open'));
    applyFilters();

    const bounds = [];
    sensors.forEach((sensor) => bounds.push([sensor.lat, sensor.lon]));
    aqsStations.forEach((station) => bounds.push([station.lat, station.lon]));
    if (bounds.length) {
      map.fitBounds(bounds, { padding: [35, 35] });
    }
  </script>
</body>
