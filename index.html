    const map = L.map('map').setView([30.277925, -97.708440], 9);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {

          weight: 2,
          opacity: 0.85,
          fillOpacity: 0.02
        }
      }).addTo(map);
    }

    const colors = {
      online: '#26a641',
      offline: '#d1242f',
      other: '#8c959f'
    };

    function makeAqsIcon(color = '#111111', size = 16) {
      const height = Math.round(size * 0.94);
      const half = Math.round(size / 2);
      return L.divIcon({
      className: '',
        html: `<div style="width:0;height:0;border-left:${half}px solid transparent;border-right:${half}px solid transparent;border-bottom:${height}px solid ${color};"></div>`,
        iconSize: [size, height],
        iconAnchor: [half, Math.round(height / 2)],
      popupAnchor: [0, -8]
      });
    }

    const defaultAqsIcon = makeAqsIcon('#111111', 16);
    const highlightedAqsIcon = makeAqsIcon('#005fcc', 24);
    const aqsLayers = new Map();

    function resetAqsHighlights() {
      aqsLayers.forEach((layers) => {
        layers.circle.setStyle({
          color: '#777777',
          weight: 2,
          dashArray: '6 6',
          fill: false,
          opacity: 0.9
        });
        layers.marker.setIcon(defaultAqsIcon);
      });
    }

    function highlightNearestAqs(stationId) {
      resetAqsHighlights();
      const layers = aqsLayers.get(String(stationId));
      if (!layers) return;
      layers.circle.setStyle({
        color: '#005fcc',
        weight: 4,
        dashArray: '6 6',
        fill: false,
        opacity: 1
      });
      layers.marker.setIcon(highlightedAqsIcon);
      layers.marker.bringToFront();
      layers.circle.bringToFront();
    }

    aqsStations.forEach((station) => {
      const circle = L.circle([station.lat, station.lon], {
        radius: station.radius_m,
        color: '#777777',
        weight: 2,
        dashArray: '6 6',
        fill: false,
        opacity: 0.9
      }).bindPopup(station.popup, { maxWidth: 420 }).addTo(map);

      const marker = L.marker([station.lat, station.lon], { icon: defaultAqsIcon })
        .bindPopup(station.popup, { maxWidth: 420 })
        .addTo(map);
      aqsLayers.set(String(station.id), { circle, marker });
    });

    sensors.forEach((sensor) => {
      const marker = L.circleMarker([sensor.lat, sensor.lon], {
        radius: 7,
        color: '#111111',
        weight: 1.25,
        fillColor: colors[sensor.status] || colors.other,
        fillOpacity: 0.95
      }).bindPopup(sensor.popup, { maxWidth: 420 }).addTo(map);

      marker.on('click', () => {
        highlightNearestAqs(sensor.nearest_aqs_id);
      });
      marker.on('popupclose', () => {
        resetAqsHighlights();
      });
    });

    const bounds = [];
    sensors.forEach((sensor) => bounds.push([sensor.lat, sensor.lon]));
    aqsStations.forEach((station) => bounds.push([station.lat, station.lon]));
    if (bounds.length) {
      map.fitBounds(bounds, { padding: [35, 35] });
